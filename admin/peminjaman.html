        @media (max-width: 992px) { #sidebar { margin-left: -280px; } #content { margin-left: 0; } }

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-vtXRMe3mGCbOeY7l30aIg8H9p3Gde34f4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e4" crossorigin="anonymous" integrity="vtXRMe3mGCbOeY7l30aIg8H9p3GdeSe4IFlP6G8JMa7o7lXvnz3GFKzPxzJdPfGK" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // ─────────────────────────────────────────────
        // PEMINJAMAN MANAGER - CLEAN IMPLEMENTATION
        // ─────────────────────────────────────────────
        const PeminjamanManager = (function() {
            const API_URL = gsAPI?.appsScriptURL || 'https://script.google.com/macros/s/AKfycbzdK8HlTDc6yh6G_SfyhCx-hA9VXT4_VHKBKaj6CYvgjhf_m9qJ2pdagdFvEHoaYTTE_w/exec';
            let allData = [];
            let table = null;

            const UPDATE_FIELDS = {
                            keterangan: 'Keterangan',
                            statusKegiatan: 'Status Kegiatan',
                            namaKegiatan: 'Nama Kegiatan',
                            namaPIC: 'Nama PIC',
                            nomorWhatsAppPIC: 'Nomor WhatsApp PIC',
                            tanggalKegiatan: 'Tanggal Kegiatan',
                            waktuMulaiKegiatan: 'Waktu Mulai Kegiatan',
                            waktuSelesaiKegiatan: 'Waktu Selesai Kegiatan',
                            suratPeminjaman: 'Surat Peminjaman'
                        };

            function formatDate(dateStr) {
                if (!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
                } catch { return dateStr; }
            }

            function formatTime(timeStr) {
                if (!timeStr) return '-';
                try {
                    const d = new Date(timeStr);
                    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                } catch { return timeStr; }
            }

            function getStatusBadge(status) {
                const s = (status || 'Pending').toLowerCase();
                if (s === 'pending') return '<span class="badge-status badge-pending">Pending</span>';
                if (s === 'proses') return '<span class="badge-status badge-proses">Proses</span>';
                if (s === 'selesai') return '<span class="badge-status badge-selesai">Selesai</span>';
                if (s === 'batal') return '<span class="badge-status badge-batal">Batal</span>';
                return '<span class="badge-status badge-pending">' + status + '</span>';
            }

            async function fetchAPI(params) {
                            const url = new URL(API_URL);
                            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
                            // Cache busting untuk GET getData
                            if (params.action === 'getData') {
                                url.searchParams.set('_', Date.now().toString());
                            }
                            console.log('[Peminjaman] Request:', url.toString()); // DEBUG
                            const res = await fetch(url);
                            console.log('[Peminjaman] Response status:', res.status); // DEBUG
                            const json = await res.json();
                            console.log('[Peminjaman] Response data:', json); // DEBUG
                            return json;
                        }

            function mapRow(item) {
                            const mapped = {
                                rowId: item.rowId,
                                timestamp: item.timestamp,
                                emailAddress: item.emailAddress,
                                namaKegiatan: item.namaKegiatan,
                                namaPIC: item.namaPIC,
                                nomorWhatsAppPIC: item.nomorWhatsAppPIC,
                                tanggalKegiatan: item.tanggalKegiatan,
                                suratPeminjaman: item.suratPeminjaman,
                                waktuMulaiKegiatan: item.waktuMulaiKegiatan,
                                waktuSelesaiKegiatan: item.waktuSelesaiKegiatan,
                                keterangan: item.keterangan,
                                statusKegiatan: item.statusKegiatan
                            };
                            console.log('[Peminjaman] mapRow:', {rowId: mapped.rowId, tanggalKegiatan: mapped.tanggalKegiatan, namaKegiatan: mapped.namaKegiatan}); // DEBUG
                            return mapped;
                        }

            async function loadData() {
                                                    Swal.fire({ title: 'Memuat Data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                                                    try {
                                                        const result = await fetchAPI({ action: 'getData', module: 'peminjaman' });
                                                        console.log('[Peminjaman] loadData result type:', Array.isArray(result) ? 'array' : typeof result, result); // DEBUG
                                                        Swal.close();
                                                        if (Array.isArray(result)) {
                                                            allData = result.map(mapRow);
                                                            console.log('[Peminjaman] Mapped allData:', allData.length, 'rows'); // DEBUG
                                                            applyFilters();
                                                        } else {
                                                            throw new Error(result?.error || 'Gagal memuat data');
                                                        }
                                                    } catch (error) {
                                                        Swal.close();
                                                        console.error('Error loading peminjaman:', error);
                                                        Swal.fire({ icon: 'error', title: 'Gagal Memuat', text: 'Tidak dapat memuat data dari Google Sheets: ' + error.message });
                                                    }
                                                }

            function applyFilters() {
                            const status = document.getElementById('filterStatus').value;
                            const start = document.getElementById('filterStartDate').value;
                            const end = document.getElementById('filterEndDate').value;
                            console.log('[Peminjaman] applyFilters:', {status, start, end, allDataCount: allData.length}); // DEBUG

                            let filtered = allData.filter(item => {
                                if (status && (item.statusKegiatan || '').toLowerCase() !== status.toLowerCase()) return false;
                                if (start && new Date(item.tanggalKegiatan) < new Date(start)) return false;
                                if (end) {
                                    const endDate = new Date(end);
                                    endDate.setHours(23, 59, 59);
                                    if (new Date(item.tanggalKegiatan) > endDate) return false;
                                }
                                return true;
                            });

                            console.log('[Peminjaman] Filtered:', filtered.length, 'rows'); // DEBUG
                            filtered.sort((a, b) => new Date(b.tanggalKegiatan) - new Date(a.tanggalKegiatan));
                            renderTable(filtered);
                        }

            function renderTable(data) {
                const tbody = document.querySelector('#peminjamanTable tbody');
                if (!tbody) return;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Tidak ada data</td></tr>';
                    if (table) { table.destroy(); table = null; }
                    return;
                }

                const html = data.map(item => {
                    const whatsapp = item.nomorWhatsAppPIC
                        ? `<a href="https://wa.me/${String(item.nomorWhatsAppPIC).replace(/\D/g, '')}" target="_blank">${item.nomorWhatsAppPIC}</a>`
                        : '-';
                    const surat = item.suratPeminjaman
                        ? `<a href="${item.suratPeminjaman}" target="_blank"><i class="fas fa-file-pdf text-danger"></i> Lihat</a>`
                        : '-';
                    const waktu = item.waktuMulaiKegiatan && item.waktuSelesaiKegiatan
                        ? `${formatTime(item.waktuMulaiKegiatan)} - ${formatTime(item.waktuSelesaiKegiatan)}`
                        : '-';

                    return `
                        <tr data-rowid="${item.rowId}">
                            <td>${formatDate(item.tanggalKegiatan)}</td>
                            <td>${item.namaKegiatan || '-'}</td>
                            <td>${item.namaPIC || '-'}</td>
                            <td>${whatsapp}</td>
                            <td>${waktu}</td>
                            <td>${surat}</td>
                            <td>${item.keterangan || '-'}</td>
                            <td>${getStatusBadge(item.statusKegiatan)}</td>
                            <td>
                                <button class="btn btn-sm btn-action btn-view me-1" onclick="PeminjamanManager.viewDetail('${item.rowId}')"><i class="fas fa-eye"></i></button>
                                <button class="btn btn-sm btn-action btn-edit me-1" onclick="PeminjamanManager.editData('${item.rowId}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-action btn-delete" onclick="PeminjamanManager.deleteData('${item.rowId}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');

                tbody.innerHTML = html;

                if (table) table.destroy();
                table = $('#peminjamanTable').DataTable({
                    order: [[0, 'desc']],
                    language: { search: 'Cari:', lengthMenu: 'Tampilkan _MENU_ data', info: 'Menampilkan _START_ hingga _END_ dari _TOTAL_ data' }
                });
            }

            function findItem(rowId) {
                return allData.find(d => String(d.rowId) === String(rowId));
            }

            // ─── Public API ───
            return {
                async init() {
                    setDefaultDates();
                    await loadData();
                },

                async viewDetail(rowId) {
                    const item = findItem(rowId);
                    if (!item) return Swal.fire({ icon: 'error', title: 'Data tidak ditemukan' });

                    const html = `
                        <div class="text-start">
                            <p><strong>Kegiatan:</strong> ${item.namaKegiatan || '-'}</p>
                            <p><strong>PIC:</strong> ${item.namaPIC || '-'}</p>
                            <p><strong>WhatsApp:</strong> ${item.nomorWhatsAppPIC || '-'}</p>
                            <p><strong>Email:</strong> ${item.emailAddress || '-'}</p>
                            <p><strong>Tanggal:</strong> ${formatDate(item.tanggalKegiatan)}</p>
                            <p><strong>Waktu:</strong> ${item.waktuMulaiKegiatan && item.waktuSelesaiKegiatan ? formatTime(item.waktuMulaiKegiatan) + ' - ' + formatTime(item.waktuSelesaiKegiatan) : '-'}</p>
                            <p><strong>Surat:</strong> ${item.suratPeminjaman ? `<a href="${item.suratPeminjaman}" target="_blank"><i class="fas fa-file-pdf text-danger"></i> Lihat</a>` : '-'}</p>
                            <p><strong>Keterangan:</strong> ${item.keterangan || '-'}</p>
                            <p><strong>Status:</strong> ${getStatusBadge(item.statusKegiatan)}</p>
                        </div>
                    `;
                    Swal.fire({ title: 'Detail Peminjaman', html, confirmButtonColor: '#002d5d', width: '600px' });
                },

                async editData(rowId) {
                    const item = findItem(rowId);
                    if (!item) return Swal.fire({ icon: 'error', title: 'Data tidak ditemukan' });

                    const html = `
                        <div class="text-start">
                            <p class="text-muted small"><strong>Kegiatan:</strong> ${item.namaKegiatan || '-'}</p>
                            <p class="text-muted small"><strong>PIC:</strong> ${item.namaPIC || '-'}</p>
                            <hr>
                            <div class="mb-3">
                                <label class="form-label">Status Kegiatan</label>
                                <select id="editStatus" class="form-select">
                                    <option value="Pending" ${item.statusKegiatan === 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Proses" ${item.statusKegiatan === 'Proses' ? 'selected' : ''}>Proses</option>
                                    <option value="Selesai" ${item.statusKegiatan === 'Selesai' ? 'selected' : ''}>Selesai</option>
                                    <option value="Batal" ${item.statusKegiatan === 'Batal' ? 'selected' : ''}>Batal</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Keterangan</label>
                                <select id="editKeterangan" class="form-select">
                                    <option value="">-- Pilih --</option>
                                    <option value="Diterima" ${item.keterangan === 'Diterima' ? 'selected' : ''}>Diterima</option>
                                    <option value="Ditolak" ${item.keterangan === 'Ditolak' ? 'selected' : ''}>Ditolak</option>
                                    <option value="Hubungi Laboran" ${item.keterangan === 'Hubungi Laboran' ? 'selected' : ''}>Hubungi Laboran</option>
                                </select>
                            </div>
                        </div>
                    `;

                    const result = await Swal.fire({
                        title: 'Edit Status & Keterangan',
                        html,
                        showCancelButton: true,
                        confirmButtonColor: '#002d5d',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Simpan',
                        preConfirm: () => ({
                            statusKegiatan: document.getElementById('editStatus').value,
                            keterangan: document.getElementById('editKeterangan').value
                        })
                    });

                    if (!result.isConfirmed) return;

                                        const success = await updateRow(item.rowId, result.value);
                                        if (success) {
                                            Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Data diupdate', timer: 1500, showConfirmButton: false })
                                                .then(() => window.location.reload());
                                        } else {
                                            Swal.fire({ icon: 'error', title: 'Gagal', text: 'Gagal menyimpan ke Google Sheets' });
                                        }
                },

                async deleteData(rowId) {
                    const item = findItem(rowId);
                    if (!item) return;

                    const confirm = await Swal.fire({
                        title: 'Konfirmasi Hapus',
                        text: `Hapus "${item.namaKegiatan}"?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#dc3545',
                        confirmButtonText: 'Ya, Hapus'
                    });

                    if (!confirm.isConfirmed) return;

                    const result = await fetchAPI({ action: 'deleteData', module: 'peminjaman', rowId });
                    if (result?.success) {
                        allData = allData.filter(d => String(d.rowId) !== String(rowId));
                        applyFilters();
                        Swal.fire({ icon: 'success', title: 'Dihapus', timer: 2000, showConfirmButton: false });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Gagal Hapus', text: result?.error || 'Unknown error' });
                    }
                }
            };

            function setDefaultDates() {
                            // Jangan set default tanggal - biarkan kosong agar semua data tampil
                            // User bisa filter manual jika perlu
                            document.getElementById('filterStartDate').value = '';
                            document.getElementById('filterEndDate').value = '';
                        }

            async function updateRow(rowId, data) {
                const updates = [];
                for (const [key, value] of Object.entries(data)) {
                    if (UPDATE_FIELDS[key] && value !== '') {
                        updates.push(fetchAPI({
                            action: 'updateData',
                            module: 'peminjaman',
                            rowId,
                            columnName: UPDATE_FIELDS[key],
                            newValue: value
                        }));
                    }
                }
                if (updates.length === 0) return true;
                const results = await Promise.all(updates);
                return results.every(r => r?.success === true);
            }
        })();

        // ─────────────────────────────────────────────
        // GLOBAL HELPERS
        // ─────────────────────────────────────────────
        function applyFilters() {
            PeminjamanManager.applyFilters();
        }

        function logout() {
            Swal.fire({ title: 'Logout?', text: 'Yakin keluar?', icon: 'question', showCancelButton: true, confirmButtonColor: '#002d5d', confirmButtonText: 'Ya' })
            .then(function(result) {
                if (result.isConfirmed) {
                    localStorage.removeItem('admin_logged_in');
                    localStorage.removeItem('admin_username');
                    window.location.href = 'index.html';
                }
            });
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem('admin_logged_in') !== 'true') {
                window.location.href = 'index.html';
                return;
            }
            const username = localStorage.getItem('admin_username') || 'Admin';
            const initials = username.substring(0, 2).toUpperCase();
            document.getElementById('adminName').textContent = username;
            document.getElementById('userInitials').textContent = initials;
            document.getElementById('userInitialsHeader').textContent = initials;
            document.getElementById('welcomeText').textContent = 'Kelola Peminjaman - ' + username;

            PeminjamanManager.init();
        });
    </script>
</body>
</html>
