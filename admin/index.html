<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Login | Laboratorium Informatika UM Bandung</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous">
<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0"
      crossorigin="anonymous">
<style>
  body{
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;font-family:'Segoe UI',sans-serif;
  }
  .card{width:100%;max-width:420px;border:none;border-radius:1rem;box-shadow:0 1rem 3rem rgba(0,0,0,.15);}
  .card-header{background:#002d5d;color:#fff;border-top-left-radius:1rem;border-top-right-radius:1rem;padding:2rem;text-align:center;}
  .card-body{padding:2.5rem;}
  .form-control{border-radius:.5rem;padding:.75rem 1rem;}
  .btn-primary{background:#002d5d;border:none;border-radius:.5rem;padding:.75rem;font-weight:600;}
  .btn-primary:hover{background:#00428a;}
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <i class="fas fa-user-shield fa-2x mb-2"></i>
    <h4 class="mb-0">Admin Panel</h4>
    <small>Laboratorium Informatika UM Bandung</small>
  </div>

  <div class="card-body">
    <div id="err" class="alert alert-danger d-none mb-3" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control" id="user" placeholder="admin" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" id="pwd" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Masuk</button>
    </form>
  </div>
</div>

<script>
/* ── konfigurasi sederhana ── */
const VALID_USER = 'admin';
const VALID_PASS = 'RahasiaAdmin2025!';   // ganti di sini kalau mau password lain

const form = document.getElementById('loginForm');
const err  = document.getElementById('err');

form.addEventListener('submit', e => {
  e.preventDefault();
  err.classList.add('d-none');

  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pwd').value;

  if (u !== VALID_USER) return showErr('Username salah');
  if (p !== VALID_PASS) return showErr('Password salah');

  // login sukses – set localStorage agar dashboard bisa cek
  localStorage.setItem('admin_logged_in', 'true');
  localStorage.setItem('admin_username', u);
  localStorage.setItem('login_time', Date.now().toString());
  location.href = 'dashboard.html';
});

function showErr(msg){
  err.textContent = msg;
  err.classList.remove('d-none');
  document.getElementById('pwd').focus();
}

// auto redirect jika sudah login
if (localStorage.getItem('admin_logged_in') === 'true') {
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
