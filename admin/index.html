<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Laboratorium Informatika UM Bandung</title>
    
    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-pgQg/6N2xV8l9p3lJt9v5p9vK9y5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5v5" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --umb-blue: #002d5d; 
            --umb-blue-light: #00428a;
            --umb-gold: #ffc107; 
            --bg-light: #f8faff; 
            --text-gray: #4b5563;
            --admin-bg: #f5f7fa;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .login-header {
            background: linear-gradient(135deg, var(--umb-blue) 0%, var(--umb-blue-light) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: var(--umb-gold);
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--umb-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 45, 93, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--umb-blue) 0%, var(--umb-blue-light) 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 45, 93, 0.2);
        }

        .alert {
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.9rem;
        }

        .brand-text {
            font-size: 0.9rem;
            color: #6c757d;
            text-align: center;
            margin-top: 20px;
        }

        .brand-text strong {
            color: var(--umb-blue);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- Security headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://code.jquery.com https://cdn.datatables.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; frame-src https://datastudio.google.com https://lookerstudio.google.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://cdn.jsdelivr.net https://docs.google.com; base-uri 'self'; form-action 'self';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h3 class="mb-2">Admin Panel</h3>
            <p class="mb-0 opacity-75">Laboratorium Informatika UM Bandung</p>
        </div>

        <div class="login-body">
            <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" id="username" class="form-control border-start-0" 
                               placeholder="Masukkan username" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-lock text-muted"></i>
                        </span>
                        <input type="password" id="password" class="form-control border-start-0" 
                               placeholder="Masukkan password" required>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" id="submitBtn" class="btn btn-login">
                        <span class="loading-spinner"></span>
                        <span id="btnText">MASUK KE DASHBOARD</span>
                    </button>
                </div>
            </form>

            <div class="brand-text">
                <p class="mb-0">Sistem Admin <strong>Laboratorium Informatika UM Bandung</strong></p>
                <small>© 2024 Teknik Informatika. Hak cipta dilindungi.</small>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-vtXRMe3mGCbOeY7l30aIg8H9p3Gde34f4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e4e4" integrity="sha384-vtXRMe3mGCbOeY7l30aIg8H9p3GdeSe4IFlP6G8JMa7o7lXvnz3GFKzPxzJdPfGK" crossorigin="anonymous"></script>
    <script>
        // SHA-256 helper menggunakan Web Crypto API (built-in, no library needed)
        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.addEventListener("DOMContentLoaded", function() {
            const loginForm = document.getElementById('loginForm');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = submitBtn.querySelector('.loading-spinner');

            // Kredensial admin - HASHED dengan SHA-256 + salt
            const SALT = "labif2024_umb_bandung";
            const PASSWORD_HASH = "6f4f3dc367cf8d8752f32eaa46aaefe323c53303f9d2a58aaecf2a03c014a2d1";
            const ADMIN_USERNAME = "admin";

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!username || !password) {
                    showError("Username dan password harus diisi");
                    return;
                }

                // Reset error state
                errorAlert.classList.add('d-none');
                submitBtn.disabled = true;
                spinner.style.display = 'inline-block';
                btnText.textContent = 'Memproses...';

                // Validasi username
                if (username !== ADMIN_USERNAME) {
                    setTimeout(() => showError("Username tidak dikenali"), 300);
                    return;
                }

                // Hash password dengan SHA-256 + salt
                try {
                    const inputHash = await sha256(SALT + password);
                    
                    setTimeout(() => {
                        if (inputHash === PASSWORD_HASH) {
                            // Login berhasil
                            localStorage.setItem('admin_logged_in', 'true');
                            localStorage.setItem('admin_username', username);
                            localStorage.setItem('login_time', new Date().getTime());
                            
                            window.location.href = 'dashboard.html';
                        } else {
                            showError("Password salah!");
                        }
                    }, 500);
                } catch (err) {
                    console.error("Hash error:", err);
                    showError("Error validasi password");
                }
            });

            function showError(message) {
                errorMessage.textContent = message;
                errorAlert.classList.remove('d-none');
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'MASUK KE DASHBOARD';
                document.getElementById('username').focus();
            }

            // Check if already logged in
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            const loginTime = localStorage.getItem('login_time');
            const currentTime = new Date().getTime();
            
            // Auto logout setelah 8 jam (28800000 ms)
            if (isLoggedIn === 'true' && loginTime && (currentTime - loginTime) < 28800000) {
                window.location.href = 'dashboard.html';
            } else if (isLoggedIn === 'true') {
                // Clear expired session
                localStorage.removeItem('admin_logged_in');
                localStorage.removeItem('admin_username');
                localStorage.removeItem('login_time');
            }

            // Enter key navigation
            document.getElementById('username').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('password').focus();
                }
            });

            document.getElementById('password').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.requestSubmit();
                }
            });
        });
    </script>
</body>
</html>
