<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Verification | Laboratorium Informatika</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --umb-blue: #002d5d;
            --umb-gold: #ffc107;
            --primary-neon: #00f2ff;
            --success-neon: #39ff14;
            --danger-neon: #ff3131;
        }

        body { 
            background: #ffffff; /* Background belakang tetap putih */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .card-verif { 
            max-width: 420px; 
            width: 100%; 
            border-radius: 30px; 
            text-align: center; 
            border: 1px solid rgba(255, 193, 7, 0.3);
            background: var(--umb-blue); /* Card tetap warna biru tema */
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 45, 93, 0.3);
            color: white;
        }

        .logo-container {
            margin-bottom: 20px;
            position: relative;
            z-index: 5;
        }

        .logo-lab {
            width: 80px;
            height: 80px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
            border: 2px solid var(--umb-gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Scanning Line */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--umb-gold), transparent);
            box-shadow: 0 0 15px var(--umb-gold);
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Centang Hijau */
        .status-icon { 
            font-size: 4.5rem; 
            margin-bottom: 10px;
            color: var(--success-neon);
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.5));
        }

        .label-text { 
            font-size: 0.7rem; 
            color: var(--umb-gold); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 600;
        }

        .data-text { 
            font-weight: 700; 
            color: white; 
            font-size: 1.1rem; 
            letter-spacing: 0.5px;
        }

        .data-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-left: 4px solid var(--umb-gold);
            transition: 0.3s;
        }

        .official-badge {
            font-size: 0.65rem;
            letter-spacing: 2px;
            border: 1px solid var(--success-neon);
            color: var(--success-neon);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-retry {
            border: 1px solid var(--umb-gold);
            color: var(--umb-gold);
            background: transparent;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-retry:hover {
            background: var(--umb-gold);
            color: var(--umb-blue);
        }

        #loading p { animation: pulse 1.5s infinite; color: var(--umb-gold); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card card-verif p-5">
        <div class="scanner-line" id="line-scan"></div>

        <div class="logo-container">
            <div class="logo-lab mb-2">
                <i class="fas fa-university fa-3x text-dark"></i>
            </div>
            <!-- Teks Putih -->
            <div class="small fw-bold text-uppercase" style="letter-spacing: 1px; color: var(--umb-gold);">Lab Informatika</div>
            <div class="small text-white opacity-75">UM Bandung</div>
        </div>

        <!-- LOADING STATE -->
        <div id="loading">
            <div class="spinner-border text-warning mb-3" style="width: 2.5rem; height: 2.5rem;" role="status"></div>
            <p class="small fw-bold">ENCRYPTING CONNECTION...</p>
        </div>

        <!-- SUCCESS STATE -->
        <div id="content" style="display:none;">
            <!-- Ikon Centang Hijau -->
            <div class="status-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            
            <h4 class="fw-bold mb-1 text-white">DOKUMEN ASLI</h4>
            <div class="official-badge">Verified System</div>
            
            <div class="text-start p-3 rounded-3 data-box mb-4">
                <div class="mb-3 border-bottom border-white border-opacity-10 pb-2">
                    <span class="label-text">Nama Lengkap</span>
                    <div id="v-nama" class="data-text">...</div>
                </div>
                <div>
                    <span class="label-text">NIM / ID</span>
                    <div id="v-nim" class="data-text">...</div>
                </div>
            </div>
            
            <p class="small text-white opacity-50 mb-0" style="font-size: 0.7rem;">Verified at: <span id="v-time" class="text-white opacity-100"></span></p>
        </div>

        <!-- ERROR STATE -->
        <div id="error-box" style="display:none;">
            <div class="status-icon text-danger"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 class="fw-bold text-danger mb-1">INVALID</h3>
            <p id="error-msg" class="text-white-50 small mb-4">Data tidak terdaftar.</p>
            <button onclick="location.reload()" class="btn btn-sm btn-retry rounded-pill px-4">SCAN ULANG</button>
        </div>
    </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const nimDariQR = params.get('nim');
    const SHEET_ID = '1Ke7WpL9qsUlez63hyctzIJuQwpCBRbf0uQr3NROtm9g';

    async function verifikasiSekarang() {
        if (!nimDariQR) {
            tampilkanError("QR Code tidak terbaca atau link tidak lengkap.");
            return;
        }

        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            const response = await fetch(url);
            const text = await response.text();
            const jsonData = JSON.parse(text.substring(47).slice(0, -2));
            const rows = jsonData.table.rows;

            const barisCocok = rows.find(r => {
                if (!r.c[3]) return false;
                const nimDiSheet = (r.c[3].f || r.c[3].v || "").toString().trim();
                return nimDiSheet === nimDariQR.trim();
            });

            setTimeout(() => {
                if (barisCocok) {
                    document.getElementById('v-nama').innerText = barisCocok.c[2] ? (barisCocok.c[2].v || "-") : "-";
                    document.getElementById('v-nim').innerText = barisCocok.c[3] ? (barisCocok.c[3].f || barisCocok.c[3].v || "-") : "-";
                    document.getElementById('v-time').innerText = new Date().toLocaleString('id-ID', { dateStyle: 'long', timeStyle: 'short' });
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    document.getElementById('line-scan').style.display = 'none';
                } else {
                    tampilkanError(`DATA TIDAK DITEMUKAN: <br><span class='text-danger'>NIM ${nimDariQR}</span> belum terverifikasi Bebas Lab.`);
                }
            }, 2000);

        } catch (err) {
            tampilkanError("SERVER TIMEOUT. PASTIKAN KONEKSI INTERNET STABIL.");
        }
    }

    function tampilkanError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-box').style.display = 'block';
        document.getElementById('line-scan').style.background = 'var(--danger-neon)';
        document.getElementById('error-msg').innerHTML = msg;
    }

    window.onload = verifikasiSekarang;
    </script>
</body>
</html>
