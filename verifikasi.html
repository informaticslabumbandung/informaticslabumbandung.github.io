<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Surat | Lab IF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #eef2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-verif { max-width: 400px; width: 100%; border-radius: 25px; text-align: center; border: none; background: white; }
        .status-icon { font-size: 5rem; margin-bottom: 20px; }
        .label-text { font-size: 0.85rem; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; }
        .data-text { font-weight: 700; color: #212529; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="card card-verif shadow-lg p-5">
        <div id="loading">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="text-muted">Menghubungkan ke Database Lab...</p>
        </div>

        <div id="content" style="display:none;">
            <div class="status-icon text-success"><i class="fas fa-check-circle"></i></div>
            <h3 class="fw-bold text-success mb-1">DOKUMEN ASLI</h3>
            <p class="text-muted small mb-4">Terverifikasi Digital oleh Lab IF</p>
            
            <div class="text-start p-3 bg-light rounded-4 mb-4">
                <div class="mb-3">
                    <span class="label-text">Nama Lengkap</span>
                    <div id="v-nama" class="data-text">-</div>
                </div>
                <div>
                    <span class="label-text">NIM</span>
                    <div id="v-nim" class="data-text">-</div>
                </div>
            </div>
            
            <div class="alert alert-success py-2 small fw-bold shadow-sm">
                <i class="fas fa-shield-alt me-1"></i> VALID & RESMI
            </div>
        </div>

        <div id="error-box" style="display:none;">
            <div class="status-icon text-danger"><i class="fas fa-times-circle"></i></div>
            <h3 class="fw-bold text-danger mb-1">TIDAK VALID</h3>
            <p id="error-msg" class="text-muted small mb-4">Data tidak ditemukan.</p>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-secondary rounded-pill px-4">Coba Lagi</button>
        </div>
    </div>

    <script>
    // Ambil NIM dari URL (?nim=12345)
    const params = new URLSearchParams(window.location.search);
    const nimDariQR = params.get('nim');
    
    // ID SPREADSHEET KAMU
    const SHEET_ID = '1Ke7WpL9qsUlez63hyctzIJuQwpCBRbf0uQr3NROtm9g';

    async function verifikasiSekarang() {
        if (!nimDariQR) {
            tampilkanError("Scan QR Code pada surat fisik untuk memulai verifikasi.");
            return;
        }

        try {
            // URL JSON Google Sheets
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            const response = await fetch(url);
            const text = await response.text();
            
            // Parsing data dari Google (Hapus prefix "/* google.visualize... */")
            const jsonData = JSON.parse(text.substring(47).slice(0, -2));
            const rows = jsonData.table.rows;

            // CARI DATA (NIM ada di Kolom D / Index 3)
            const barisCocok = rows.find(r => {
                if (!r.c[3]) return false;
                // Ambil nilai murni (v) atau teks terformat (f)
                const nimDiSheet = (r.c[3].f || r.c[3].v || "").toString().trim();
                return nimDiSheet === nimDariQR.trim();
            });

            if (barisCocok) {
                // Nama di Kolom C (Index 2), NIM di Kolom D (Index 3)
                document.getElementById('v-nama').innerText = barisCocok.c[2] ? (barisCocok.c[2].v || "-") : "-";
                document.getElementById('v-nim').innerText = barisCocok.c[3] ? (barisCocok.c[3].f || barisCocok.c[3].v || "-") : "-";
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                tampilkanError(`NIM <b>${nimDariQR}</b> tidak terdaftar dalam database Bebas Laboratorium.`);
            }
        } catch (err) {
            console.error(err);
            tampilkanError("Gagal mengambil data. Pastikan Spreadsheet sudah di 'Publish to Web'.");
        }
    }

    function tampilkanError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-box').style.display = 'block';
        document.getElementById('error-msg').innerHTML = msg;
    }

    // Jalankan Verifikasi
    window.onload = verifikasiSekarang;
    </script>
</body>
</html>
